<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" width="1280" height="820" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f6"/>
      <stop offset="1" stop-color="#f7f8fb"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#1e3a8a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="820" fill="url(#bg)"/>

  <!-- Title bar -->
  <g transform="translate(40,34)">
    <rect x="0" y="0" width="40" height="40" rx="11" fill="url(#brand)"/>
    <path d="M11 30 L11 11 M11 24 l6 -6 4 3 8 -10" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="20" font-size="22" font-weight="800" fill="#0b1220">Executive Performance Review</text>
    <text x="54" y="40" font-size="13" fill="#94a3b8">9 rows · 6 fields · 5 measures · CSV · Generated by VIS</text>
  </g>
  <g transform="translate(1090,44)">
    <rect x="0" y="0" width="150" height="34" rx="10" fill="#1e3a8a"/>
    <text x="75" y="22" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Export ▾</text>
  </g>

  <!-- KPI cards -->
  <g>
    <!-- card 1 -->
    <g transform="translate(40,100)" filter="url(#shadow)">
      <rect width="285" height="128" rx="20" fill="#ffffff"/>
      <rect x="20" y="20" width="30" height="30" rx="9" fill="#e7ecfa"/>
      <path d="M35 27 a8 8 0 1 0 0.1 0 M35 30 v10 M31 33 h8" stroke="#1e3a8a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="58" y="40" font-size="13" font-weight="600" fill="#475569">Revenue</text>
      <text x="20" y="86" font-size="34" font-weight="800" fill="#0b1220">$2.15M</text>
      <rect x="20" y="98" width="58" height="20" rx="7" fill="#dcfce7"/>
      <text x="49" y="112" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">▲ +8.4%</text>
      <text x="90" y="112" font-size="12" fill="#94a3b8">latest</text>
    </g>
    <!-- card 2 -->
    <g transform="translate(345,100)" filter="url(#shadow)">
      <rect width="285" height="128" rx="20" fill="#ffffff"/>
      <rect x="20" y="20" width="30" height="30" rx="9" fill="#e7ecfa"/>
      <path d="M35 27 a8 8 0 1 0 0.1 0 M35 30 v10 M31 33 h8" stroke="#1e3a8a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="58" y="40" font-size="13" font-weight="600" fill="#475569">Net Profit</text>
      <text x="20" y="86" font-size="34" font-weight="800" fill="#0b1220">$1.03M</text>
      <rect x="20" y="98" width="66" height="20" rx="7" fill="#dcfce7"/>
      <text x="53" y="112" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">▲ +12.7%</text>
      <text x="98" y="112" font-size="12" fill="#94a3b8">latest</text>
    </g>
    <!-- card 3 -->
    <g transform="translate(650,100)" filter="url(#shadow)">
      <rect width="285" height="128" rx="20" fill="#ffffff"/>
      <rect x="20" y="20" width="30" height="30" rx="9" fill="#e7ecfa"/>
      <circle cx="31" cy="33" r="4" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
      <path d="M28 45 a7 7 0 0 1 14 0" fill="none" stroke="#1e3a8a" stroke-width="1.8"/>
      <text x="58" y="40" font-size="13" font-weight="600" fill="#475569">Customers</text>
      <text x="20" y="86" font-size="34" font-weight="800" fill="#0b1220">6.89K</text>
      <rect x="20" y="98" width="58" height="20" rx="7" fill="#dcfce7"/>
      <text x="49" y="112" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">▲ +8.3%</text>
      <text x="90" y="112" font-size="12" fill="#94a3b8">latest</text>
    </g>
    <!-- card 4 -->
    <g transform="translate(955,100)" filter="url(#shadow)">
      <rect width="285" height="128" rx="20" fill="#ffffff"/>
      <rect x="20" y="20" width="30" height="30" rx="9" fill="#fde7d3"/>
      <path d="M42 26 L28 40 M31 28 a2.4 2.4 0 1 0 0.1 0 M39 38 a2.4 2.4 0 1 0 0.1 0" stroke="#b45309" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="58" y="40" font-size="13" font-weight="600" fill="#475569">NPS</text>
      <text x="20" y="86" font-size="34" font-weight="800" fill="#0b1220">63</text>
      <rect x="20" y="98" width="58" height="20" rx="7" fill="#dcfce7"/>
      <text x="49" y="112" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle">▲ +7.4%</text>
      <text x="90" y="112" font-size="12" fill="#94a3b8">latest</text>
    </g>
  </g>

  <!-- Trend chart card -->
  <g transform="translate(40,248)" filter="url(#shadow)">
    <rect width="740" height="300" rx="20" fill="#ffffff"/>
    <text x="24" y="34" font-size="14" font-weight="700" fill="#475569">Revenue trend</text>
    <rect x="640" y="18" width="80" height="22" rx="7" fill="#e7ecfa"/>
    <text x="680" y="33" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">AREA</text>
    <!-- gridlines -->
    <g stroke="#eef1f6" stroke-width="1">
      <line x1="50" y1="90" x2="712" y2="90"/>
      <line x1="50" y1="150" x2="712" y2="150"/>
      <line x1="50" y1="210" x2="712" y2="210"/>
      <line x1="50" y1="270" x2="712" y2="270"/>
    </g>
    <!-- area + line (values Jan..Sep) -->
    <path d="M60 258 L142 250 L224 270 L306 210 L388 185 L470 162 L552 176 L634 130 L712 100 L712 270 L60 270 Z" fill="url(#area)"/>
    <polyline points="60,258 142,250 224,270 306,210 388,185 470,162 552,176 634,130 712,100" fill="none" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#1e3a8a">
      <circle cx="712" cy="100" r="4.5"/>
    </g>
    <!-- x labels -->
    <g font-size="11" fill="#94a3b8" text-anchor="middle">
      <text x="60" y="288">Jan</text><text x="224" y="288">Mar</text><text x="388" y="288">May</text><text x="552" y="288">Jul</text><text x="712" y="288">Sep</text>
    </g>
  </g>

  <!-- Donut card -->
  <g transform="translate(800,248)" filter="url(#shadow)">
    <rect width="440" height="300" rx="20" fill="#ffffff"/>
    <text x="24" y="34" font-size="14" font-weight="700" fill="#475569">Latest period mix</text>
    <g transform="translate(150,160)">
      <g transform="rotate(-90)" fill="none" stroke-width="34">
        <circle r="72" stroke="#1e3a8a" stroke-dasharray="181 452"/>
        <circle r="72" stroke="#0e7490" stroke-dasharray="127 452" stroke-dashoffset="-181"/>
        <circle r="72" stroke="#b45309" stroke-dasharray="90 452" stroke-dashoffset="-308"/>
        <circle r="72" stroke="#7c3aed" stroke-dasharray="54 452" stroke-dashoffset="-398"/>
      </g>
      <text x="0" y="-4" font-size="24" font-weight="800" fill="#0b1220" text-anchor="middle">5</text>
      <text x="0" y="16" font-size="12" fill="#94a3b8" text-anchor="middle">measures</text>
    </g>
    <!-- legend -->
    <g transform="translate(280,90)" font-size="12.5" fill="#475569">
      <circle cx="0" cy="0" r="5" fill="#1e3a8a"/><text x="14" y="4">Revenue</text>
      <circle cx="0" cy="30" r="5" fill="#0e7490"/><text x="14" y="34">Expenses</text>
      <circle cx="0" cy="60" r="5" fill="#b45309"/><text x="14" y="64">Net Profit</text>
      <circle cx="0" cy="90" r="5" fill="#7c3aed"/><text x="14" y="94">Customers</text>
    </g>
  </g>

  <!-- Executive summary card -->
  <g transform="translate(40,568)" filter="url(#shadow)">
    <rect width="740" height="212" rx="20" fill="#ffffff"/>
    <text x="24" y="36" font-size="14" font-weight="700" fill="#475569">Executive Summary</text>
    <rect x="656" y="20" width="64" height="22" rx="7" fill="#e7ecfa"/>
    <text x="688" y="35" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">AI</text>
    <text x="24" y="76" font-size="15" fill="#0b1220" font-weight="500">Over the observed period, Revenue increased by +73%,</text>
    <text x="24" y="102" font-size="15" fill="#0b1220" font-weight="500">reaching $2.15M in the latest period. Net Profit grew</text>
    <text x="24" y="128" font-size="15" fill="#0b1220" font-weight="500">+171% while customer count climbed to 6,890 with an</text>
    <text x="24" y="154" font-size="15" fill="#0b1220" font-weight="500">improving NPS of 63 — a broadly healthy trajectory.</text>
    <text x="24" y="188" font-size="13" fill="#94a3b8">Areas needing attention were flagged in Key Findings.</text>
  </g>

  <!-- Key findings card -->
  <g transform="translate(800,568)" filter="url(#shadow)">
    <rect width="440" height="212" rx="20" fill="#ffffff"/>
    <text x="24" y="36" font-size="14" font-weight="700" fill="#475569">Key Findings</text>
    <!-- finding 1 -->
    <g transform="translate(24,54)">
      <rect width="30" height="30" rx="9" fill="#dcfce7"/>
      <path d="M9 20 l5 -5 4 3 6 -8" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="14" font-size="12.5" fill="#0b1220">Revenue grew +73% Jan → Sep.</text>
      <text x="42" y="31" font-size="12.5" fill="#475569">Strong, sustained momentum.</text>
    </g>
    <!-- finding 2 -->
    <g transform="translate(24,104)">
      <rect width="30" height="30" rx="9" fill="#e7ecfa"/>
      <path d="M15 8 l2.6 5.3 5.9 0.9 -4.3 4.1 1 5.9 L15 26 l-5.2 3.9 1 -5.9 -4.3 -4.1 5.9 -0.9 z" transform="translate(0,-3) scale(0.7)" fill="#1e3a8a"/>
      <text x="42" y="14" font-size="12.5" fill="#0b1220">Net Profit is the fastest mover.</text>
      <text x="42" y="31" font-size="12.5" fill="#475569">Margins expanding each quarter.</text>
    </g>
    <!-- finding 3 -->
    <g transform="translate(24,154)">
      <rect width="30" height="30" rx="9" fill="#fdeada"/>
      <path d="M15 8 v10 M15 22 v0.2" stroke="#d97706" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M15 6 L4 26 h22 z" fill="none" stroke="#d97706" stroke-width="1.8" stroke-linejoin="round"/>
      <text x="42" y="14" font-size="12.5" fill="#0b1220">March dipped 10% vs. Feb.</text>
      <text x="42" y="31" font-size="12.5" fill="#475569">One-off — recovered by April.</text>
    </g>
  </g>
</svg>
